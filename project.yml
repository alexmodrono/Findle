name: Foodle
options:
  bundleIdPrefix: es.amodrono.foodle
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_STRICT_CONCURRENCY: complete
    FOODLE_BUNDLE_PREFIX: es.amodrono.foodle
    APP_GROUP_IDENTIFIER: group.es.amodrono.foodle
  configs:
    Nightly:
      FOODLE_BUNDLE_PREFIX: es.amodrono.foodle.nightly
      APP_GROUP_IDENTIFIER: group.es.amodrono.foodle.nightly

configs:
  Debug: debug
  Nightly: release
  Release: release

schemes:
  Foodle:
    build:
      targets:
        Foodle: all
        FoodleFileProvider: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SharedDomainTests
        - NetworkingTests
        - FileProviderTests
        - PersistenceTests
        - SyncEngineTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  Foodle-Nightly:
    build:
      targets:
        Foodle: all
        FoodleFileProvider: all
    run:
      config: Nightly
    test:
      config: Nightly
      targets:
        - SharedDomainTests
        - NetworkingTests
        - FileProviderTests
        - PersistenceTests
        - SyncEngineTests
    profile:
      config: Nightly
    analyze:
      config: Nightly
    archive:
      config: Nightly

packages:
  Airlock:
    url: https://github.com/alexmodrono/Airlock
    from: 0.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Foodle:
    type: application
    platform: macOS
    configFiles:
      Nightly: Config/Nightly-App.xcconfig
      Release: Config/Release-App.xcconfig
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.Mac:
          enabled: 1
    sources:
      - path: Sources/App
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
      - target: FoodleSyncEngine
      - target: FoodleFileProvider
        embed: true
        codeSign: true
      - package: Airlock
        product: Airlock
      - package: Sparkle
        product: Sparkle
      - sdk: CoreSpotlight.framework
    settings:
      base:
        PRODUCT_NAME: Findle
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle
        INFOPLIST_FILE: Resources/Info/App-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Entitlements/Foodle.entitlements
        ENABLE_APP_SANDBOX: YES
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
      configs:
        Nightly:
          PRODUCT_NAME: Findle Nightly
          PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.nightly

  SharedDomain:
    type: framework
    platform: macOS
    configFiles:
      Nightly: Config/Nightly-Framework.xcconfig
      Release: Config/Release-Framework.xcconfig
    sources:
      - path: Sources/SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.shared-domain
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist
        CODE_SIGN_IDENTITY: "-"

  FoodleNetworking:
    type: framework
    platform: macOS
    configFiles:
      Nightly: Config/Nightly-Framework.xcconfig
      Release: Config/Release-Framework.xcconfig
    sources:
      - path: Sources/Networking
    dependencies:
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.networking
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist
        CODE_SIGN_IDENTITY: "-"

  FoodlePersistence:
    type: framework
    platform: macOS
    configFiles:
      Nightly: Config/Nightly-Framework.xcconfig
      Release: Config/Release-Framework.xcconfig
    sources:
      - path: Sources/Persistence
    dependencies:
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.persistence
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist
        CODE_SIGN_IDENTITY: "-"

  FoodleSyncEngine:
    type: framework
    platform: macOS
    configFiles:
      Nightly: Config/Nightly-Framework.xcconfig
      Release: Config/Release-Framework.xcconfig
    sources:
      - path: Sources/SyncEngine
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.sync-engine
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist
        CODE_SIGN_IDENTITY: "-"

  FoodleFileProvider:
    type: app-extension
    platform: macOS
    configFiles:
      Nightly: Config/Nightly-FileProvider.xcconfig
      Release: Config/Release-FileProvider.xcconfig
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.Mac:
          enabled: 1
    sources:
      - path: Sources/FileProviderExtension
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
      - target: FoodleSyncEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.file-provider
        INFOPLIST_FILE: Resources/Info/FileProvider-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Entitlements/FileProvider.entitlements
        ENABLE_APP_SANDBOX: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
      configs:
        Nightly:
          PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.nightly.file-provider
    info:
      path: Resources/Info/FileProvider-Info.plist
      properties:
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleSymbolName: graduationcap
        NSExtension:
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).FileProviderExtension"
          NSExtensionFileProviderDocumentGroup: "$(APP_GROUP_IDENTIFIER)"
          NSExtensionFileProviderSupportsEnumeration: true
          NSExtensionFileProviderActions:
            - NSExtensionFileProviderActionIdentifier: $(FOODLE_BUNDLE_PREFIX).action.open-in-moodle
              NSExtensionFileProviderActionName: Open in Moodle
              NSExtensionFileProviderActionActivationRule: TRUEPREDICATE
            - NSExtensionFileProviderActionIdentifier: $(FOODLE_BUNDLE_PREFIX).action.copy-moodle-link
              NSExtensionFileProviderActionName: Copy Moodle Link
              NSExtensionFileProviderActionActivationRule: TRUEPREDICATE
            - NSExtensionFileProviderActionIdentifier: $(FOODLE_BUNDLE_PREFIX).action.open-course-page
              NSExtensionFileProviderActionName: Open Course Page
              NSExtensionFileProviderActionActivationRule: TRUEPREDICATE
            - NSExtensionFileProviderActionIdentifier: $(FOODLE_BUNDLE_PREFIX).action.keep-downloaded
              NSExtensionFileProviderActionName: Keep Downloaded
              NSExtensionFileProviderActionActivationRule: TRUEPREDICATE
            - NSExtensionFileProviderActionIdentifier: $(FOODLE_BUNDLE_PREFIX).action.remove-download
              NSExtensionFileProviderActionName: Remove Download
              NSExtensionFileProviderActionActivationRule: TRUEPREDICATE

  SharedDomainTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SharedDomainTests
    dependencies:
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.shared-domain-tests

  NetworkingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NetworkingTests
    dependencies:
      - target: FoodleNetworking
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.networking-tests

  PersistenceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PersistenceTests
    dependencies:
      - target: FoodlePersistence
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.persistence-tests

  FileProviderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/FileProviderTests
      - path: Sources/FileProviderExtension/FileDownloader.swift
      - path: Sources/FileProviderExtension/FileProviderItem.swift
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.file-provider-tests

  SyncEngineTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SyncEngineTests
    dependencies:
      - target: FoodleSyncEngine
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.sync-engine-tests
