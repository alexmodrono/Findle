name: Foodle
options:
  bundleIdPrefix: es.amodrono.foodle
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: 54WRV8QX2U
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Release: release

schemes:
  Foodle:
    build:
      targets:
        Foodle: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SharedDomainTests
        - NetworkingTests
        - PersistenceTests
        - SyncEngineTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Foodle:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
      - target: FoodleSyncEngine
      - target: FoodleFileProvider
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle
        INFOPLIST_FILE: Resources/Info/App-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Entitlements/Foodle.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  SharedDomain:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.shared-domain
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist

  FoodleNetworking:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Networking
    dependencies:
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.networking
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist

  FoodlePersistence:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Persistence
    dependencies:
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.persistence
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist

  FoodleSyncEngine:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SyncEngine
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.sync-engine
        INFOPLIST_FILE: Resources/Info/Framework-Info.plist

  FoodleFileProvider:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/FileProviderExtension
    dependencies:
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
      - target: FoodleSyncEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.file-provider
        INFOPLIST_FILE: Resources/Info/FileProvider-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Entitlements/FileProvider.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    info:
      path: Resources/Info/FileProvider-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).FileProviderExtension"
          NSExtensionFileProviderDocumentGroup: "group.es.amodrono.foodle"
          NSExtensionFileProviderSupportsEnumeration: true

  SharedDomainTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SharedDomainTests
    dependencies:
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.shared-domain-tests

  NetworkingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NetworkingTests
    dependencies:
      - target: FoodleNetworking
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.networking-tests

  PersistenceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PersistenceTests
    dependencies:
      - target: FoodlePersistence
      - target: SharedDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.persistence-tests

  SyncEngineTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SyncEngineTests
    dependencies:
      - target: FoodleSyncEngine
      - target: SharedDomain
      - target: FoodleNetworking
      - target: FoodlePersistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: es.amodrono.foodle.sync-engine-tests
